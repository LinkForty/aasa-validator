name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

permissions:
  contents: write # changesets pushes the version PR and tags
  pull-requests: write # changesets opens the "Version Packages" PR
  id-token: write # OIDC: authenticate to npm via trusted publishing (no token)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Opens/updates a "Version Packages" PR, or publishes to npm when that PR merges.
      # Auth is via GitHub OIDC trusted publishing — no NPM_TOKEN needed.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          # Re-format after the version bump so changesets' JSON style doesn't
          # trip Biome's formatter in CI on the Version Packages PR.
          version: pnpm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
